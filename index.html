<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Harry Bradrocco</title>
		<meta
			name="description"
			content="Harry Bradrocco — projects, trance radio, photography, and more."
		/>
		<style>
			:root {
				--bg: #091216;
				--ink: #ecf4f7;
				--muted: #9db2bb;
				--line: rgba(120, 178, 200, 0.36);
				--accent: #ff8a5f;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				width: 100%;
				height: 100%;
			}

			body {
				font-family: "Myriad Pro", Myriad, "Segoe UI", Helvetica, Arial, sans-serif;
				color: var(--ink);
				background: var(--bg);
				overflow: hidden;
			}

			#pondCanvas {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				display: block;
			}

			.overlay {
				position: fixed;
				inset: 0;
				pointer-events: none;
				padding: 28px;
				display: flex;
				flex-direction: column;
				justify-content: flex-start;
				background:
					radial-gradient(circle at 8% 8%, rgba(255, 138, 95, 0.13), transparent 32%),
					radial-gradient(circle at 90% 90%, rgba(88, 180, 198, 0.18), transparent 36%);
			}

			.head {
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				gap: 16px;
			}

			.title-wrap {
				max-width: min(620px, 100%);
				margin-top: 14px;
				pointer-events: auto;
			}

			.meta {
				margin: 0;
				font-size: 0.76rem;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--muted);
			}

			h1 {
				margin: 10px 0 8px;
				font-size: clamp(2.8rem, 8.4vw, 6.6rem);
				line-height: 1.02;
				letter-spacing: 0.01em;
				text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
			}

			.roleline {
				margin: 0;
				color: var(--muted);
				font-size: clamp(1.15rem, 2.9vw, 1.65rem);
			}

			.projects {
				margin: 34px 0 0;
				display: flex;
				flex-wrap: wrap;
				gap: 14px;
				align-items: center;
				color: var(--muted);
				font-size: 1.08rem;
			}

			.projects span {
				color: var(--muted);
			}

			.projects a {
				color: rgba(236, 244, 247, 0.92);
				text-decoration: none;
				border-bottom: 1px solid rgba(236, 244, 247, 0.28);
				transition: color 0.14s ease, border-color 0.14s ease;
			}

			.projects a:hover {
				color: var(--accent);
				border-color: var(--accent);
			}

			.sub {
				margin: 0;
				color: var(--muted);
				font-size: clamp(0.9rem, 2.2vw, 1.05rem);
			}

			.links {
				pointer-events: auto;
				display: flex;
				flex-wrap: wrap;
				justify-content: flex-end;
				align-items: center;
				gap: 12px;
				max-width: min(540px, 100%);
			}

			.links a {
				text-decoration: none;
				color: rgba(236, 244, 247, 0.9);
				font-size: 1.08rem;
				padding: 0;
				border: 0;
				background: transparent;
				transition: color 0.14s ease;
			}

			.links a:hover {
				color: var(--accent);
			}

			@media (max-width: 640px) {
				.overlay {
					padding: 16px;
				}

				.head {
					flex-direction: column;
				}

				h1 {
					font-size: clamp(1.9rem, 10vw, 3rem);
				}

				.links {
					justify-content: flex-start;
					gap: 10px;
				}

				.links a {
					font-size: 1rem;
				}
			}
		</style>
	</head>
	<body>
		<canvas id="pondCanvas"></canvas>

		<main class="overlay">
			<header class="head">
				<div class="title-wrap">
					<h1>Harry Bradrocco</h1>
					<p class="roleline">Engineer, developer, music &amp; photography.</p>
					<p class="projects">
						<span>Active Projects:</span>
						<a href="https://github.com/Lithiumwow/Baseframecalculator" target="_blank" rel="noopener noreferrer">Baseframecalculator</a>
						<a href="https://github.com/Lithiumwow/PSV-L4ZCompressions" target="_blank" rel="noopener noreferrer">PSV-L4ZCompressions</a>
					</p>
				</div>

				<nav class="links" aria-label="Main Links and Social Links">
					<a href="/photos/">Photography</a>
					<a href="https://www.facebook.com/harrybradroccophotography/" target="_blank" rel="noopener noreferrer">Facebook Photos</a>
					<a href="/tranceradio/">Radio</a>
					<a href="/tranceradio/games/lander/">Lander</a>
					<a href="https://twitter.com/Lithiumwow">Twitter</a>
					<a href="https://github.com/Lithiumwow">GitHub</a>
				</nav>
			</header>
		</main>

		<script>
			(function () {
				var canvas = document.getElementById('pondCanvas');
				var ctx = canvas.getContext('2d');
				var pointer = { x: -9999, y: -9999, active: false };
				var fish = [];
				var ripples = [];
				var particles = [];
				var feed = [];

				function resizeCanvas() {
					var dpr = Math.max(window.devicePixelRatio || 1, 1);
					canvas.width = Math.floor(window.innerWidth * dpr);
					canvas.height = Math.floor(window.innerHeight * dpr);
					ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
				}

				function rand(min, max) {
					return Math.random() * (max - min) + min;
				}

				function makeFish() {
					var species = [
						{
							name: 'koi',
							palette: ['#ff8a52', '#f7f4ee', '#ffbc72', '#f29f67'],
							sizeMin: 12,
							sizeMax: 22,
							widthRatio: 0.5,
							tail: 10,
							speedCap: 2.0
						},
						{
							name: 'goldfish',
							palette: ['#ff6f3c', '#ff9f5a', '#ffd08a'],
							sizeMin: 10,
							sizeMax: 18,
							widthRatio: 0.62,
							tail: 12,
							speedCap: 1.8
						},
						{
							name: 'carp',
							palette: ['#d9d2c4', '#c7b39a', '#f3eee2'],
							sizeMin: 15,
							sizeMax: 26,
							widthRatio: 0.46,
							tail: 9,
							speedCap: 1.7
						}
					];
					var kind = species[Math.floor(rand(0, species.length))];
					var size = rand(kind.sizeMin, kind.sizeMax);
					var color = kind.palette[Math.floor(rand(0, kind.palette.length))];
					return {
						x: rand(80, window.innerWidth - 80),
						y: rand(80, window.innerHeight - 80),
						vx: rand(-0.75, 0.75),
						vy: rand(-0.55, 0.55),
						size: size,
						color: color,
						kind: kind.name,
						widthRatio: kind.widthRatio,
						tailLen: kind.tail,
						speedCap: kind.speedCap,
						jitter: rand(0.4, 1.2),
						tx: rand(40, window.innerWidth - 40),
						ty: rand(40, window.innerHeight - 40),
						targetTimer: rand(90, 260),
						disperseTimer: 0
					};
				}

				function makeParticle() {
					return {
						x: rand(0, window.innerWidth),
						y: rand(0, window.innerHeight),
						vx: rand(-0.08, 0.08),
						vy: rand(-0.06, 0.06),
						r: rand(0.6, 2.1),
						a: rand(0.08, 0.25)
					};
				}

				function seedFish() {
					fish = [];
					var count = Math.max(10, Math.floor((window.innerWidth * window.innerHeight) / 100000));
					for (var i = 0; i < count; i++) {
						fish.push(makeFish());
					}
				}

				function seedParticles() {
					particles = [];
					var count = Math.max(70, Math.floor((window.innerWidth * window.innerHeight) / 18000));
					for (var i = 0; i < count; i++) {
						particles.push(makeParticle());
					}
				}

				function addRipple(x, y) {
					ripples.push({ x: x, y: y, r: 1, alpha: 0.35 });
				}

				function dropFeed(x, y) {
					for (var i = 0; i < 8; i++) {
						feed.push({
							x: x + rand(-20, 20),
							y: y + rand(-14, 14),
							r: rand(2.3, 3.6),
							life: rand(560, 760)
						});
					}
					if (feed.length > 70) {
						feed.splice(0, feed.length - 70);
					}
				}

				canvas.addEventListener('pointermove', function (e) {
					pointer.x = e.clientX;
					pointer.y = e.clientY;
					pointer.active = true;
				});

				canvas.addEventListener('pointerleave', function () {
					pointer.active = false;
				});

				canvas.addEventListener('pointerdown', function (e) {
					addRipple(e.clientX, e.clientY);
					dropFeed(e.clientX, e.clientY);
				});

				window.addEventListener('resize', function () {
					resizeCanvas();
					seedFish();
					seedParticles();
				});

				function drawFish(f) {
					var angle = Math.atan2(f.vy, f.vx);
					ctx.save();
					ctx.translate(f.x, f.y);
					ctx.rotate(angle);

					var bodyGrad = ctx.createLinearGradient(-f.size, 0, f.size, 0);
					bodyGrad.addColorStop(0, 'rgba(12, 12, 12, 0.22)');
					bodyGrad.addColorStop(0.24, f.color);
					bodyGrad.addColorStop(1, 'rgba(255, 255, 255, 0.2)');

					ctx.fillStyle = bodyGrad;
					ctx.beginPath();
					ctx.ellipse(0, 0, f.size, f.size * f.widthRatio, 0, 0, Math.PI * 2);
					ctx.fill();

					// Dorsal fin
					ctx.fillStyle = 'rgba(255,255,255,0.18)';
					ctx.beginPath();
					ctx.moveTo(-f.size * 0.1, -f.size * f.widthRatio * 0.4);
					ctx.lineTo(f.size * 0.2, -f.size * f.widthRatio * 1.1);
					ctx.lineTo(f.size * 0.5, -f.size * f.widthRatio * 0.3);
					ctx.closePath();
					ctx.fill();

					// Tail
					ctx.fillStyle = f.color;
					ctx.beginPath();
					ctx.moveTo(-f.size, 0);
					ctx.lineTo(-f.size - f.tailLen, -6);
					ctx.lineTo(-f.size - f.tailLen, 6);
					ctx.closePath();
					ctx.fill();

					// Pectoral fin
					ctx.fillStyle = 'rgba(255,255,255,0.14)';
					ctx.beginPath();
					ctx.ellipse(-f.size * 0.08, f.size * f.widthRatio * 0.55, f.size * 0.18, f.size * 0.1, 0.2, 0, Math.PI * 2);
					ctx.fill();

					if (f.kind === 'koi') {
						ctx.fillStyle = 'rgba(255,255,255,0.45)';
						ctx.beginPath();
						ctx.ellipse(f.size * 0.1, 0, f.size * 0.32, f.size * 0.16, 0.3, 0, Math.PI * 2);
						ctx.fill();
					} else if (f.kind === 'carp') {
						ctx.fillStyle = 'rgba(0,0,0,0.16)';
						for (var s = 0; s < 4; s++) {
							ctx.beginPath();
							ctx.ellipse(-f.size * 0.4 + s * f.size * 0.28, 0, f.size * 0.07, f.size * 0.05, 0, 0, Math.PI * 2);
							ctx.fill();
						}
					}

					ctx.fillStyle = 'rgba(20,20,20,0.55)';
					ctx.beginPath();
					ctx.arc(f.size * 0.45, -f.size * 0.08, 1.7, 0, Math.PI * 2);
					ctx.fill();
					ctx.restore();
				}

				function tick() {
					var t = Date.now() * 0.001;
					ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

					// Subtle moving water light so the full canvas feels active.
					ctx.globalAlpha = 0.14;
					for (var w = 0; w < 5; w++) {
						var cx = ((Math.sin(t * (0.23 + w * 0.07) + w) * 0.5 + 0.5) * window.innerWidth);
						var cy = ((Math.cos(t * (0.19 + w * 0.05) + w * 1.3) * 0.5 + 0.5) * window.innerHeight);
						var g = ctx.createRadialGradient(cx, cy, 20, cx, cy, 220 + w * 40);
						g.addColorStop(0, 'rgba(130, 210, 230, 0.26)');
						g.addColorStop(1, 'rgba(130, 210, 230, 0)');
						ctx.fillStyle = g;
						ctx.beginPath();
						ctx.arc(cx, cy, 240 + w * 30, 0, Math.PI * 2);
						ctx.fill();
					}
					ctx.globalAlpha = 1;

					for (var p = 0; p < particles.length; p++) {
						var pr = particles[p];
						pr.x += pr.vx;
						pr.y += pr.vy;
						if (pr.x < -6) pr.x = window.innerWidth + 6;
						if (pr.x > window.innerWidth + 6) pr.x = -6;
						if (pr.y < -6) pr.y = window.innerHeight + 6;
						if (pr.y > window.innerHeight + 6) pr.y = -6;
						ctx.fillStyle = 'rgba(190, 235, 250, ' + pr.a + ')';
						ctx.beginPath();
						ctx.arc(pr.x, pr.y, pr.r, 0, Math.PI * 2);
						ctx.fill();
					}

					for (var r = ripples.length - 1; r >= 0; r--) {
						var rp = ripples[r];
						rp.r += 1.7;
						rp.alpha -= 0.006;
						ctx.strokeStyle = 'rgba(180, 230, 255, ' + Math.max(rp.alpha, 0) + ')';
						ctx.lineWidth = 1.2;
						ctx.beginPath();
						ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
						ctx.stroke();
						if (rp.alpha <= 0) {
							ripples.splice(r, 1);
						}
					}

					for (var fd = feed.length - 1; fd >= 0; fd--) {
						var pellet = feed[fd];
						pellet.life -= 1;
						ctx.fillStyle = 'rgba(255, 220, 150, 0.9)';
						ctx.beginPath();
						ctx.arc(pellet.x, pellet.y, pellet.r, 0, Math.PI * 2);
						ctx.fill();
						if (pellet.life <= 0) {
							feed.splice(fd, 1);
						}
					}

					for (var i = 0; i < fish.length; i++) {
						var f = fish[i];

						f.vx += Math.sin((Date.now() * 0.001 + i) * f.jitter) * 0.004;
						f.vy += Math.cos((Date.now() * 0.0013 + i) * f.jitter) * 0.004;

						f.targetTimer -= 1;
						if (f.targetTimer <= 0) {
							f.tx = rand(30, window.innerWidth - 30);
							f.ty = rand(30, window.innerHeight - 30);
							f.targetTimer = rand(110, 300);
						}
						var tdx = f.tx - f.x;
						var tdy = f.ty - f.y;
						var td = Math.max(Math.sqrt(tdx * tdx + tdy * tdy), 0.001);
						f.vx += (tdx / td) * 0.01;
						f.vy += (tdy / td) * 0.01;

						var nearest = null;
						var nearestD2 = Infinity;
						for (var k = 0; k < feed.length; k++) {
							var fx = feed[k].x - f.x;
							var fy = feed[k].y - f.y;
							var fd2 = fx * fx + fy * fy;
							if (fd2 < nearestD2) {
								nearestD2 = fd2;
								nearest = feed[k];
							}
						}

						if (nearest && nearestD2 < 90000) {
							var ad = Math.max(Math.sqrt(nearestD2), 0.001);
							f.vx += ((nearest.x - f.x) / ad) * 0.06;
							f.vy += ((nearest.y - f.y) / ad) * 0.06;
							if (nearestD2 < Math.pow(f.size * 0.9 + nearest.r + 1.8, 2)) {
								var eatIndex = feed.indexOf(nearest);
								if (eatIndex >= 0) {
									feed.splice(eatIndex, 1);
									addRipple(f.x, f.y);
									f.disperseTimer = 48;
									f.vx += rand(-0.45, 0.45);
									f.vy += rand(-0.45, 0.45);
								}
							}
						}

						if (f.disperseTimer > 0) {
							f.disperseTimer -= 1;
							f.vx += rand(-0.012, 0.012);
							f.vy += rand(-0.012, 0.012);
						}

						if (pointer.active) {
							var dx = f.x - pointer.x;
							var dy = f.y - pointer.y;
							var d2 = dx * dx + dy * dy;
							if (d2 < 26000) {
								var push = (26000 - d2) / 26000;
								var d = Math.max(Math.sqrt(d2), 0.001);
								f.vx += (dx / d) * 0.21 * push;
								f.vy += (dy / d) * 0.21 * push;
							}
						}

						for (var j = 0; j < ripples.length; j++) {
							var rr = ripples[j];
							var rx = f.x - rr.x;
							var ry = f.y - rr.y;
							var rd2 = rx * rx + ry * ry;
							if (rd2 < 34000) {
								var rpush = (34000 - rd2) / 34000;
								var rd = Math.max(Math.sqrt(rd2), 0.001);
								f.vx += (rx / rd) * 0.14 * rpush;
								f.vy += (ry / rd) * 0.14 * rpush;
							}
						}

						var speed = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
						if (speed > f.speedCap) {
							f.vx = (f.vx / speed) * f.speedCap;
							f.vy = (f.vy / speed) * f.speedCap;
						}

						f.x += f.vx;
						f.y += f.vy;

						if (f.x < 20 || f.x > window.innerWidth - 20) {
							f.vx *= -1;
						}
						if (f.y < 20 || f.y > window.innerHeight - 20) {
							f.vy *= -1;
						}

						drawFish(f);
					}

					requestAnimationFrame(tick);
				}

				resizeCanvas();
				seedFish();
				seedParticles();
				tick();
			})();
		</script>
	</body>
</html>
