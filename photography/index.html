<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photography | Lithiumwow</title>
    <style>
      :root {
        --bg: #0f1a24;
        --panel: #122232;
        --text: #e8f1f7;
        --muted: #a9bfce;
        --accent: #6ec5ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #0d1822 0%, #102436 55%, #0b141f 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }
      a.back {
        color: var(--accent);
        text-decoration: none;
        border: 1px solid #2a4458;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.2vw, 2.4rem);
      }
      p {
        margin: 6px 0 0;
        color: var(--muted);
      }
      .grid {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid #2a4458;
        border-radius: 14px;
        overflow: hidden;
      }
      .card img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: cover;
      }
      .caption {
        padding: 10px 12px;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <h1>Photography</h1>
          <p>Selected landscape shots.</p>
        </div>
        <a class="back" href="/">Back Home</a>
      </div>

      <div class="grid">
        <figure class="card">
          <img
            src="../images/img_mountains_wide.jpg"
            alt="Mountains"
            width="1000"
            height="350"
            loading="lazy"
            decoding="async"
          />
          <figcaption class="caption">Mountains</figcaption>
        </figure>
        <figure class="card">
          <img
            src="../images/img_nature_wide.jpg"
            alt="Nature"
            width="1000"
            height="350"
            loading="lazy"
            decoding="async"
          />
          <figcaption class="caption">Nature</figcaption>
        </figure>
        <figure class="card">
          <img
            src="../images/img_snow_wide.jpg"
            alt="Snow"
            width="1000"
            height="350"
            loading="lazy"
            decoding="async"
          />
          <figcaption class="caption">Snow</figcaption>
        </figure>
      </div>
    </div>
  </body>
</html>
