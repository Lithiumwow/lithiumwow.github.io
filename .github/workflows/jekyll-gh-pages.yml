name: Deploy static site to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Generate photo gallery manifest
        run: node scripts/generate-gallery-manifest.mjs

      - name: Install and build Next export
        run: |
          npm ci
          npm run build
          rsync -a --delete out/ tranceradio/
          rm -rf node_modules out .next
          rm -rf app components hooks lib styles public
          rm -f package.json package-lock.json tsconfig.json postcss.config.mjs \
            components.json next.config.mjs next-env.d.ts
          printf '%s %s\n' "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > tranceradio/.deploy-revision
          # Publish only the static site tree (tiny tar). Uploading the whole workspace led to
          # partial GitHub Pages deploys: /tranceradio/index.html stayed on old HTML that
          # referenced /Trance-24x7/_next/… so all CSS/JS 404'd and the theme broke.
          mkdir -p _site
          cp -a .nojekyll _site/
          cp -a index.html LICENSE.txt README.txt _site/
          for d in assets images photos photography transradio tranceradio radio tranceradio-live Trance-24x7; do
            if [ -d "$d" ]; then cp -a "$d" _site/; fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
