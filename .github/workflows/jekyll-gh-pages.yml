name: Deploy static site to GitHub Pages

on:
  push:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and build Next export
        run: |
          npm ci
          npm run build
          rsync -a --delete out/ tranceradio/
          # upload-pages-artifact only excludes .git and .github when tarring; leaving
          # node_modules (~50k files) caused partial publishes so /tranceradio stayed stale
          # while the repo root updated. Strip build cruft before upload.
          rm -rf node_modules out .next
          # Drop Next/TS source so the Pages tar stays small; huge artifacts caused partial
          # deploys (stale /photography, /tranceradio, etc. on the CDN).
          rm -rf app components hooks lib styles public
          rm -f package.json package-lock.json tsconfig.json postcss.config.mjs \
            components.json next.config.mjs next-env.d.ts
          printf '%s %s\n' "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > tranceradio/.deploy-revision

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
