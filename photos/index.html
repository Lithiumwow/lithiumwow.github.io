<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photography | Harry Bradrocco</title>
    <link rel="canonical" href="https://lithiumwow.github.io/photos/" />
    <style>
      :root {
        --bg: #0a1218;
        --text: #e8f1f7;
        --muted: #8aa3b5;
        --accent: #6ec5ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 18px 48px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 3vw, 1.5rem);
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      a.back {
        flex-shrink: 0;
        color: var(--accent);
        text-decoration: none;
        font-size: 0.9rem;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid rgba(110, 197, 255, 0.25);
      }
      a.back:hover {
        background: rgba(110, 197, 255, 0.08);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 8px;
      }
      .thumb {
        position: relative;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 6px;
        overflow: hidden;
        cursor: zoom-in;
        background: #111a22;
        aspect-ratio: 1;
      }
      .thumb:focus {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .empty-gallery {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
        padding: 40px 16px;
      }
      .foot {
        margin-top: 32px;
        text-align: center;
      }
      .foot a {
        color: var(--muted);
        font-size: 0.85rem;
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }
      .foot a:hover {
        color: var(--accent);
        border-bottom-color: rgba(110, 197, 255, 0.4);
      }
      /* Lightbox — no URL shown, caption optional */
      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(4, 8, 12, 0.94);
        cursor: zoom-out;
      }
      .lightbox[hidden] {
        display: none !important;
      }
      .lightbox-inner {
        position: relative;
        max-width: min(96vw, 1400px);
        max-height: 92vh;
        cursor: default;
      }
      .lightbox-inner img {
        display: block;
        max-width: min(96vw, 1400px);
        max-height: 85vh;
        width: auto;
        height: auto;
        margin: 0 auto;
        object-fit: contain;
        border-radius: 4px;
      }
      .lightbox-caption {
        margin: 12px 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        max-width: 56ch;
        margin-left: auto;
        margin-right: auto;
      }
      .lightbox-close {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 1001;
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
      }
      .lightbox-close:hover {
        background: rgba(255, 255, 255, 0.14);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <h1>Photography</h1>
        <a class="back" href="/">Home</a>
      </header>

      <div id="gallery-root" class="grid" aria-live="polite"></div>

      <footer class="foot">
        <a href="https://www.facebook.com/harrybradroccophotography/" target="_blank" rel="noopener noreferrer">Facebook</a>
      </footer>
    </div>

    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Image preview">
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
      <div class="lightbox-inner" id="lightbox-inner">
        <img id="lightbox-img" alt="" />
        <p class="lightbox-caption" id="lightbox-caption" hidden></p>
      </div>
    </div>

    <script>
      (function () {
        function safeFileName(name) {
          if (typeof name !== "string" || !name) return null;
          var b = name.split("/").pop().split("\\").pop();
          if (!b || b.indexOf("..") !== -1) return null;
          if (/[\\/]/.test(b)) return null;
          if (!/\.(jpe?g|png|gif|webp)$/i.test(b)) return null;
          return b;
        }

        var root = document.getElementById("gallery-root");
        var lightbox = document.getElementById("lightbox");
        var lightboxImg = document.getElementById("lightbox-img");
        var lightboxCaption = document.getElementById("lightbox-caption");
        var lightboxInner = document.getElementById("lightbox-inner");
        var closeBtn = document.getElementById("lightbox-close");

        function openLightbox(src, caption) {
          lightboxImg.src = src;
          lightboxImg.alt = caption ? caption : "Photo";
          if (caption) {
            lightboxCaption.textContent = caption;
            lightboxCaption.hidden = false;
          } else {
            lightboxCaption.textContent = "";
            lightboxCaption.hidden = true;
          }
          lightbox.hidden = false;
          document.body.style.overflow = "hidden";
          closeBtn.focus();
        }

        function closeLightbox() {
          lightbox.hidden = true;
          lightboxImg.removeAttribute("src");
          document.body.style.overflow = "";
        }

        closeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeLightbox();
        });

        lightbox.addEventListener("click", function (e) {
          if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && !lightbox.hidden) {
            closeLightbox();
          }
        });

        if (!root) return;

        fetch("/photos/gallery-manifest.json", { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("manifest");
            return r.json();
          })
          .then(function (list) {
            if (!Array.isArray(list) || !list.length) {
              var p = document.createElement("p");
              p.className = "empty-gallery";
              p.textContent = "No photos yet.";
              root.appendChild(p);
              return;
            }
            var frag = document.createDocumentFragment();
            for (let i = 0; i < list.length; i++) {
              const item = list[i];
              const file = safeFileName(item && item.file);
              if (!file) continue;
              const explicitCaption =
                typeof item.caption === "string" && item.caption.trim()
                  ? item.caption.trim()
                  : "";
              const thumbLabel = explicitCaption || "View photo";
              const src = "/images/gallery/" + encodeURIComponent(file);
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = "thumb";
              btn.setAttribute("aria-label", thumbLabel);
              const img = document.createElement("img");
              img.src = src;
              img.alt = "";
              img.loading = "lazy";
              img.decoding = "async";
              img.draggable = false;
              btn.appendChild(img);
              btn.addEventListener("click", function () {
                openLightbox(src, explicitCaption);
              });
              frag.appendChild(btn);
            }
            root.appendChild(frag);
          })
          .catch(function () {
            var p = document.createElement("p");
            p.className = "empty-gallery";
            p.textContent = "Gallery unavailable.";
            root.appendChild(p);
          });
      })();
    </script>
  </body>
</html>
